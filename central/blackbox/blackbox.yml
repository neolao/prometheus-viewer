modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      method: GET
      valid_status_codes: []       # empty = accepts any 2xx by default
      follow_redirects: true
      fail_if_ssl: false
      fail_if_not_ssl: false       # set to true if you want to require HTTPS
      preferred_ip_protocol: "ip4" # the container has no IPv6 route
      ip_protocol_fallback: false
      tls_config:
        insecure_skip_verify: false
