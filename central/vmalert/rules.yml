groups:
  - name: system
    rules:
      - alert: HostDown
        expr: (time() - host_last_seen_timestamp) > 180
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.host }} has not reported metrics for 3 min"

      - alert: DiskSpaceLow
        expr: disk_free_percent < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.host }} ({{ $value }}% free)"

      - alert: CpuHigh
        expr: cpu_usage_percent > 90
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.host }} ({{ $value }}%)"

  - name: websites
    rules:
      - alert: SiteDown
        expr: probe_success == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Site {{ $labels.instance }} unreachable"

      - alert: SiteSlow
        expr: probe_duration_seconds > 3
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Site {{ $labels.instance }} slow ({{ $value }}s response time)"
