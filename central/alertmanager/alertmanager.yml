route:
  receiver: telegram-warning
  group_by: ['alertname']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: telegram-critical

receivers:
  - name: telegram-warning
    telegram_configs:
      - bot_token: "REPLACE_ME_BOTFATHER_TOKEN"
        chat_id: 0  # REPLACE_ME with your chat_id (@userinfobot)
        parse_mode: ''

  - name: telegram-critical
    telegram_configs:
      - bot_token: "REPLACE_ME_BOTFATHER_TOKEN"
        chat_id: 0  # REPLACE_ME, can be the same chat or a different one (e.g. a dedicated group for critical alerts)
        parse_mode: ''

# Note: this file is NOT interpolated with the .env variables — replace
# the values above directly before starting Alertmanager.
